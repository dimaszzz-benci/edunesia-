<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduNesia - Quiz</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

  <div class="app">

    <!-- HEADER -->
    <header class="quiz-header">
      <div class="quiz-header-inner">
        <button class="btn-back" onclick="window.location.href='../index.html'">&#8592;</button>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" id="progressBar"></div>
        </div>
        <div class="quiz-stats">
          <div class="quiz-stat">
            <span style="color:#ff9600">&#128293;</span>
            <span id="streakCount">0</span>
          </div>
          <div class="quiz-stat">
            <span style="color:#58cc02">&#9889;</span>
            <span id="xpCount">0</span>
          </div>
        </div>
      </div>
    </header>

    <!-- MAIN -->
    <main class="quiz-main">

      <!-- INFO -->
      <div class="quiz-label" id="quizLabel">Memuat soal...</div>

      <!-- LOADING -->
      <div class="loading-wrap" id="loadingState">
        <div class="spinner"></div>
        <div class="loading-text">Menyiapkan soal untukmu...</div>
      </div>

      <!-- SOAL -->
      <div id="soalState" style="display:none">
        <div class="soal-text" id="soalText"></div>

        <div class="pilihan-list" id="pilihanGroup"></div>

        <div class="feedback-box" id="feedbackBox">
          <div class="feedback-title" id="feedbackTitle"></div>
          <div class="feedback-text" id="feedbackText"></div>
        </div>

        <button class="btn-next" id="btnNext" onclick="nextSoal()">
          Lanjut
        </button>
      </div>

      <!-- SELESAI -->
      <div class="selesai-wrap" id="selesaiState">
        <div class="selesai-icon">&#127881;</div>
        <div class="selesai-title">Keren!</div>
        <div class="selesai-skor" id="skorAkhir"></div>
        <button class="btn-home" onclick="window.location.href='../index.html'">
          Kembali ke Menu
        </button>
      </div>

    </main>
  </div>

  <script src="../js/quiz.js"></script>
</body>
</html>
