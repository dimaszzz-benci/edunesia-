<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduNesia</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <div class="app">

    <!-- HEADER -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <div class="logo-icon">E</div>
          <span class="logo-text">EduNesia</span>
        </div>
        <div class="header-stats">
          <div class="stat-pill">
            <span class="stat-icon fire">&#128293;</span>
            <span id="streakCount">0</span>
          </div>
          <div class="stat-pill">
            <span class="stat-icon bolt">&#9889;</span>
            <span id="xpCount">0</span>
          </div>
        </div>
      </div>
    </header>

    <!-- HERO -->
    <section class="hero">
      <div class="hero-text">
        <h1>Belajar Bahasa Inggris</h1>
        <p>Seru, cepat, dan efektif setiap hari</p>
      </div>
    </section>

    <!-- CARD PILIHAN -->
    <main class="main">

      <!-- JENJANG -->
      <div class="section-label">Pilih Jenjang</div>
      <div class="grid-2" id="jenjangGroup">
        <button class="choice-btn" onclick="pilihJenjang('SD')">
          <span class="choice-emoji">&#128218;</span>
          <span>SD</span>
        </button>
        <button class="choice-btn" onclick="pilihJenjang('SMP')">
          <span class="choice-emoji">&#128214;</span>
          <span>SMP</span>
        </button>
        <button class="choice-btn" onclick="pilihJenjang('SMA')">
          <span class="choice-emoji">&#127979;</span>
          <span>SMA</span>
        </button>
        <button class="choice-btn" onclick="pilihJenjang('SMK')">
          <span class="choice-emoji">&#128295;</span>
          <span>SMK</span>
        </button>
      </div>

      <!-- KELAS -->
      <div id="kelasSection" class="hidden">
        <div class="section-label">Pilih Kelas</div>
        <div class="grid-3" id="kelasGroup"></div>
      </div>

      <!-- LEVEL -->
      <div id="levelSection" class="hidden">
        <div class="section-label">Pilih Level</div>
        <div class="level-list" id="levelGroup">
          <button class="level-btn" onclick="pilihLevel(1)">
            <div class="level-left">
              <div class="level-badge l1">1</div>
              <div>
                <div class="level-name">Pemula</div>
                <div class="level-desc">Kosakata dasar</div>
              </div>
            </div>
            <div class="level-arrow">›</div>
          </button>
          <button class="level-btn" onclick="pilihLevel(2)">
            <div class="level-left">
              <div class="level-badge l2">2</div>
              <div>
                <div class="level-name">Dasar</div>
                <div class="level-desc">Kalimat sederhana</div>
              </div>
            </div>
            <div class="level-arrow">›</div>
          </button>
          <button class="level-btn" onclick="pilihLevel(3)">
            <div class="level-left">
              <div class="level-badge l3">3</div>
              <div>
                <div class="level-name">Menengah</div>
                <div class="level-desc">Grammar & percakapan</div>
              </div>
            </div>
            <div class="level-arrow">›</div>
          </button>
          <button class="level-btn" onclick="pilihLevel(4)">
            <div class="level-left">
              <div class="level-badge l4">4</div>
              <div>
                <div class="level-name">Mahir</div>
                <div class="level-desc">Teks kompleks</div>
              </div>
            </div>
            <div class="level-arrow">›</div>
          </button>
          <button class="level-btn" onclick="pilihLevel(5)">
            <div class="level-left">
              <div class="level-badge l5">5</div>
              <div>
                <div class="level-name">Expert</div>
                <div class="level-desc">Tingkat lanjut</div>
              </div>
            </div>
            <div class="level-arrow">›</div>
          </button>
        </div>
      </div>

      <!-- TOMBOL MULAI -->
      <div id="mulaiSection" class="hidden">
        <button class="btn-start" onclick="mulaiQuiz()">Mulai Belajar</button>
      </div>

    </main>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
